[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA / SSR fallback — Astro's Netlify adapter handles routing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security / performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Forms still needs a plain HTML form to detect at build time — we inject a hidden one.
# (See public/__forms.html)
